apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prod-ingress
  namespace: ingress-nginx
spec:
  ingressClassName: nginx
  rules:
  - host: prod.localhost.com
    http:
      paths:
      - path: /user
        pathType: Prefix
        backend:
          service:
            name: gf-user-service
            port:
              number: 80
  tls: 
  - hosts: 
      - prod.localhost.com
    secretName: tls-secret